name: ci-cpu
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history so --changed-only can diff origin/main
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: FFmpeg libs for torchcodec (lerobot video decode/ingest tripwire)
        # tests/suggested/ch0.4/test_record.py decodes video through lerobot ->
        # torchcodec, which dlopen's the system libav* (libavutil et al.). Runners
        # ship none, so the load fails; pyav's bundled ffmpeg does NOT satisfy
        # torchcodec. Install the system codec set.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: pip install -e ".[dev,export]" --quiet   # export: onnx for tests/common/test_export_parity.py
      - name: Lint + ALL pedagogy gates + unit (identical to `make check`)
        # Single source of truth: invoke `make check` so this per-PR lane can never
        # drift from the local pre-PR gate. PY/PYTEST/RUFF point at the CI system
        # interpreter (the Makefile defaults to .venv/bin/*). `make check` runs ruff
        # + all seven pedagogy gates (loc caps, forbidden imports, prose-code drift,
        # prose includes, demo assets, draft scaffolding, wallclock provenance) +
        # the notebook-hash static check + unit tests (paths per infra/decisions/005;
        # grader is infra per 013).
        run: make check PY=python PYTEST=pytest RUFF=ruff
      - name: Chapter smoke (CPU, tiny steps; bitwise determinism x2 — CPU lane only)
        run: python infra/ci/smoke_chapters.py --changed-only --seed 0 --verify-determinism --python python
