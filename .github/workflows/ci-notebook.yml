name: ci-notebook
on:
  schedule: [{ cron: "0 2 * * *" }]   # nightly
  workflow_dispatch:
jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Job-level so the triage step's `if` can gate on it: secrets cannot be
    # referenced directly in `if`, so we surface the key as an env var. When the
    # secret is unset this is empty and the triage step is SKIPPED (not failed),
    # so a missing key no longer masks the real notebook pass/fail signal.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Headless software GL for MuJoCo's classic renderer: CI runners have no GPU
      # and no X DISPLAY, so mjr_makeContext needs OSMesa (the same reason the
      # Modal/scale-lab runners set a headless MUJOCO_GL backend). Kernels inherit
      # this process env (run_notebooks.py), so rendering chapters (ch1.7/1.8,
      # ch5.3/5.4) get a valid context instead of a FatalError.
      MUJOCO_GL: osmesa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Headless GL libs (OSMesa software renderer for MuJoCo)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libosmesa6 libgl1
      # export: onnxruntime for curriculum.common.assert_parity (imported by every
      # chapter artifact). mjx: jax + mujoco-mjx for the ch2.3 MJX excursion. Both
      # are needed to even IMPORT those artifacts headless — ci-cpu already pulls
      # `export`; the notebook lane must too. ipykernel: nbclient needs a kernel.
      - run: pip install -e ".[dev,notebooks,export,mjx]" ipykernel --quiet
      - name: Hash-sync check (notebook <-> chapter artifact)
        run: python infra/ci/check_notebook_hashes.py
      - name: Execute all notebooks headless (CPU-sim smoke profile)
        run: python infra/ci/run_notebooks.py --profile cpu-smoke --fail-fast false --report infra/ci/reports/notebooks.json
      - name: File issues for failures (headless Claude)
        # Only when notebooks failed AND the key exists; skipped (green) otherwise,
        # so an unset key does not add a spurious red on top of the real signal.
        if: ${{ failure() && env.ANTHROPIC_API_KEY != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "Read infra/ci/reports/notebooks.json. For each failing notebook, file or refresh a GitHub issue titled 'notebook-ci: <name>' containing the traceback, the chapter it belongs to, and a one-line hypothesis. Do not attempt fixes." \
            --allowedTools "Bash(gh issue:*)" "Read"
