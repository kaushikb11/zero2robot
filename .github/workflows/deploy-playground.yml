name: deploy-playground
# Build the standalone MuJoCo-WASM teleop playground (playground/) and deploy the
# prebuilt dist/ to its own Cloudflare Pages project → play.zero2robot.com.
# Pure Node build (tsc + vite); no Python step. See infra/decisions/017.
#
# Runs on the public repo kaushikb11/zero2robot (only repo with Actions runners);
# reaches it via publish.sh. Triggers are push:main + workflow_dispatch only.
on:
  push:
    branches: [main]
    paths:
      - "playground/**"
      - ".github/workflows/deploy-playground.yml"
  workflow_dispatch:

concurrency:
  group: deploy-playground
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: playground/package-lock.json
      - name: Install playground deps
        working-directory: playground
        run: npm ci

      # NOTE: the preloaded toy/bc .onnx policies under playground/public/models are
      # git-ignored (generated by scripts/make_toy_onnx.py). They are absent in CI,
      # so the "load a preset policy" hooks degrade until we add a gen step here;
      # teleop + record + drag-drop-your-own-.onnx all work without them. (v1 gap.)
      - name: Build playground (tsc --noEmit && vite build)
        working-directory: playground
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy playground/dist --project-name=zero2robot-playground --branch=main
