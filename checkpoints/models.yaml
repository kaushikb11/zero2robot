# checkpoints/models.yaml — the model-hosting manifest (the in-repo POINTER).
#
# Root CLAUDE.md invariant #5: "No binaries in git." The trained .onnx policies
# that drive the site's live demos live on the Hugging Face Hub; this manifest is
# the pointer the doctrine calls for. It is the single source of truth that ties
# together the TRIANGLE every live demo depends on:
#
#     site toy  ->  MODEL_URL "/models/<name>.onnx"          (what the browser loads)
#         |
#     manifest  ->  this file: name + sha256 + provenance    (the pointer + contract)
#         |
#     exporter  ->  the chapter .py that produces the .onnx   (where it comes from)
#
# infra/ci/check_demo_assets.py enforces that triangle: a toy that loads a model
# with no manifest entry, or a manifest entry whose exporter does not exist/produce
# it, fails CI. site/scripts/fetch_models.py reads this manifest at build time and
# provisions site/public/models/<name>.onnx from the Hub (sha256-verified); if the
# fetch fails the demo gracefully degrades to its poster frame (site/CLAUDE.md).
#
# ---------------------------------------------------------------------------
# HOW TO REGENERATE sha256 (author, after re-exporting a model):
#   1. run the model's exporter so site/public/models/<name>.onnx is fresh
#   2. shasum -a 256 site/public/models/<name>.onnx
#   3. paste the digest into that model's `sha256:` below
#   4. python scripts/upload_models_hf.py   (uploads the .onnx + model card to HF)
# The sha256 recorded here MUST match the bytes served from the Hub, or every
# fetch re-downloads and the checksum gate warns. Exports are CPU-deterministic
# (seeded), so re-running an exporter reproduces the same bytes -> same digest.
# ---------------------------------------------------------------------------

# HF repo the fetch pulls from and the upload pushes to. Files resolve at:
#   https://huggingface.co/<hf_repo>/resolve/main/<filename>
# The public HF repo the .onnx publish to + fetch from. NOTE: the repo is `policies`,
# NOT `models` — HF reserves the top-level name `models`. Populated via
# scripts/upload_models_hf.py; if a fetch can't reach it, demos degrade to posters.
hf_repo: zero2robot/policies

# Where fetch_models.py writes the provisioned files (repo-relative). A model's
# on-disk path is <public_dir> + <site_path>, e.g. site/public + /models/bc_policy.onnx.
public_dir: site/public

# One entry per model. Add a row here the moment a new arm's exporter lands; the
# triangle gate keys off `site_path` (matched against each toy's MODEL_URL) and
# `exporter` (must exist and name the filename).
