    provenance: "seed 0 on cpu, mujoco 3.10.0 / numpy 2.4.6; --smoke (300 steps); measured 2026-07-03"
    buggy_lateral_drift: 0.418   # smoke signature of the injected sticky-shove bug (~0.42 m vs ~0.09 m)
    buggy_band: 0.05             # |drift - buggy| < band => bug still present, SKIP
    ref_lateral_drift_abs: 0.01  # a correct fix reproduces sim_loop.py within these bands
    ref_box_final_pos_abs: 0.01

