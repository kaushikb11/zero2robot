id: ch0.4-record
title: "Teleoperation & Your First Dataset"
artifact: record.py         # target ~200 LOC, CPU/browser; two inputs, one canonical writer
task: pusht                 # PushT teleop -> LeRobot v3 episodes (ALOHA-sim teleop arrives in a later phase)
objectives:
  - Understand what an episode IS — a list of (observation, action) pairs — and what your first dataset physically is on disk (LeRobot v3: parquet data + meta/info/stats/episodes/tasks)
  - Record PushT episodes two ways — local scripted teleop and ingest of the browser's z2r-teleop-1 interchange — through the SAME canonical lerobot writer, so both are format-identical to gen_demos by construction
  - Hold the obs[10]/action[2] layout that chapter 1.1's BC trains on, and see why the feature schema (dtypes, shapes, names) is the contract that must not drift
  - Recognize this dataset as the artifact-continuity anchor: it follows you to 0.5 (inspect), 1.1 (behavior cloning), and 1.2 (curation)
scale_lab: false
read_the_real_thing: false
demo: pusht-teleop

# Reference values + seeded bands for the exercise checks (exercise-spec:
# "seeded-run band with provenance", not bare magic numbers). checks.py reads
# these instead of hardcoding tolerances. Re-measure if any of the stack moves.
exercise_checks:
  provenance: "seed 0 on cpu, mujoco 3.10.0 / lerobot 0.4.4 (CODEBASE_VERSION v3.0) / numpy 2.4.6; --smoke; measured 2026-07-04"
  ex1:                          # predict-then-run: how episode count scales the dataset
    provenance: "record.py --smoke drives a FIXED 40 control steps per episode; n_frames must be exactly 40 * --episodes"
    smoke_steps_per_episode: 40 # the fixed smoke episode length
    invariant_keys: ["obs_dim", "act_dim", "feature_keys", "fps"]  # unchanged as episode count grows
  ex2:                          # bug-hunt: a wrong feature shape that breaks parity with the training data
    provenance: "the parity contract mirrored from gen_demos.build_features / pusht_env.py"
    obs_shape: [10]             # observation.state MUST be float32[10]
    act_shape: [2]              # action MUST be float32[2]
  ex3:                          # code-completion: the add_frame / save_episode loop
    provenance: "a synthetic 2-episode set (3 + 2 frames) written via the completed writer, checked vs a gen_demos golden schema"
    expected_frames: 5          # 3 + 2 frames across the two synthetic episodes

