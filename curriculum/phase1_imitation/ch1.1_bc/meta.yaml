id: ch1.1-bc
title: "Behavior Cloning: The Dumbest Thing That Works"
artifact: bc.py           # target ~220 LOC
task: pusht               # LeRobot PushT dataset (pretrained path) + learner teleop path
dataset:
  reference: lerobot/pusht
  learner_path: true      # from ch0.4 teleop session
objectives:
  - Implement supervised imitation from (obs, action) pairs in a single file
  - Explain why MSE on actions is a defensible (and flawed) starting objective
  - Diagnose covariate shift from a rerun trace of a failing rollout
  - Run the full train→eval→export→browser loop with your own dataset
scale_lab: false
read_the_real_thing: false
demo: pusht_bc_recovery   # hero: visitor perturbs block, BC policy sometimes recovers, often doesn't

