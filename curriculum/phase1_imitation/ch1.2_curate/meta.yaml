id: ch1.2-curate
title: "Data Is the Policy"
artifact: curate.py        # 341 LOC: scores + filters + re-trains 1.1's BC twice in one file (doctrine cap 450)
task: pusht                # LeRobot PushT datasets: your ch0.4 recordings (curated) + the reference expert
dataset:
  reference: lerobot/pusht
  learner_path: true       # curates the learner's own ch0.4 teleop session
objectives:
  - Score demonstration quality with dataset-ONLY signals (episode outcome, demonstrator disagreement, coverage), never touching the environment
  - Filter bad episodes and show curated data beats raw on held-out success despite training on FEWER episodes
  - Explain why demonstrator disagreement measures task difficulty, not label noise, and why optimizing it as a quality proxy backfires (Break It)
  - Re-train chapter 1.1's behavior cloning on the curated dataset and measure the jump
scale_lab: false
read_the_real_thing: false
demo: pusht_curate_quality  # side-by-side: raw-trained vs curated-trained policy on the same held-out starts

# All reference metrics: seed 0, cpu, mujoco 3.10.0 / torch 2.10.0 / lerobot
# 0.4.4 / numpy 2.4.6. The chapter's "raw" is the reproducible careful+sloppy
# stand-in (250 careful @ noise 0.05 + 250 sloppy @ noise 0.70) built by
# gen_demos; a learner who passes --data <their ch0.4 dataset> gets different
# absolute numbers but the same qualitative story.
reference_run:
  provenance: "seed 0 on cpu; default config (careful 250, sloppy 250, epochs 300, hidden_dim 256, eval_episodes 50); measured 2026-07-05"
  n_episodes: 500
  n_reached_goal: 288
  raw_success_rate: 0.08
  curated_success_rate: 0.22
  delta_success_rate: 0.14        # curated wins on 288 episodes vs raw's 500: quality beats quantity
  mean_disagreement_raw: 0.442585
  mean_disagreement_curated: 0.380268    # kept set (outcome filter); population std
  break_low_disagreement_success: 0.12   # keeps lowest-disagreement demos: below curated (0.22), above raw (0.08), the Break It that HURTS
  break_low_disagreement_disagreement: 0.378111  # LOWER than honest curation's 0.380, yet a worse policy (the trap)
  break_low_disagreement_far_success: "5/31"     # vs curated 8/31 and raw 2/31: the hard starts are where it gives up
  break_shortest_success: 0.22           # NOTE honest: on this stand-in shortest COINCIDES with outcome (careful demos are both short and successful), so it does NOT hurt here. Kept as a second, weaker illustration that a proxy can happen to align with truth

# Reference metrics + seeded bands for the exercise checks (exercise-spec:
# "seeded-run band with provenance", not a bare magic number). checks.py reads
# these instead of hardcoding tolerances. IMPORTANT: the exercises run at the
# chapter's DEFAULT config, not a reduced one: the Break It trap (low
# disagreement -> worse policy) only reproduces at full scale; at 40 eval
# episodes evaluation noise swamps it (measured: reduced-config break 0.15 vs
# curated 0.125, the trap VANISHES). That fragility is itself chapter 1.6's
# thesis, and the reason these checks are @slow (each trains 2 policies, ~5 min).
exercise_checks:
  exercise_config:                # shared by ex1/ex2/ex3, passed to curate.py (== chapter default)
    careful: 250
    sloppy: 250
    epochs: 300
    eval_episodes: 50
    hidden_dim: 256
    provenance: "seed 0 on cpu; measured 2026-07-05 with curate.py (default config)"
    raw_success_rate: 0.08
    curated_success_rate: 0.22
    break_low_disagreement_success: 0.12
  ex1:                            # ex1_predict_curate_vs_raw.py (predict-then-run)
    answer: "B"                   # curated wins despite FEWER episodes
    min_delta: 0.05               # curated - raw (measured 0.14) must clear this for the reproduce assert
  ex2:                            # ex2_predict_break.py (predict-then-run)
    answer: "C"                   # break (0.12) < curated (0.22), above raw (0.08): the seductive metric backfires
  ex3:                            # ex3_bughunt_filter.py (bug-hunt)
    buggy_delta_max: 0.0          # inverted filter trains on the FAILURES: curated <= raw (delta non-positive)
    fixed_min_delta: 0.05         # a correct fix restores curated - raw >= this
  ex4:                            # ex4_completion_disagreement.py (code-completion)
    rel_tol: 1.0e-6               # completed frame_disagreement must match the reference on the fixture

