id: ch1.3-act
title: "ACT: Commit to the Chunk"
artifact: act.py            # target ~350 LOC (built to 379: chunking data-prep + a from-scratch transformer + temporal-ensembling eval, all in one file)
task: aloha_cube            # bimanual cube transfer with a mandatory mid-air handoff (curriculum/common/envs/aloha_cube)
objectives:
  - Predict a CHUNK of K future actions per forward pass instead of one action, and explain why committing to a short plan beats re-averaging every step on a coordination task
  - Build a tiny transformer encoder-decoder from scratch in torch (entity-token attention encoder + learned-query decoder) with no transformer library
  - Apply temporal ensembling at eval (average overlapping chunk predictions with exponential weights) and measure the smoothness it buys
  - Name what this teaching version drops from real ACT (the CVAE latent, the image backbone) and why the deterministic core still beats single-step BC here
scale_lab: false

# READ-THE-REAL-THING: the map's ch1.3 row calls for a guided read of the
# original ACT repo (chunking + temporal-ensembling code). The real repo is
# tonyzhaozh/act (Zhao et al., "Learning Fine-Grained Bimanual Manipulation with
# Low-Cost Hardware", RSS 2023). The rtrt: block stays commented until a real
# commit sha is pinned: an sha must be verified, never invented. site RTRT.astro
# renders nothing until repo + commit both exist, so carrying the flag is safe.
read_the_real_thing: true
rtrt:
  repo: tonyzhaozh/act
  commit: 742c753c0d4a5d87076c8f69e5628c79a8cc5488   # default-branch HEAD (no tags in repo); pinned 2026-07-07
  focus:
    - imitate_episodes.py  temporal ensembling loop (all_time_actions + exp weights)
    - policy.py            the CVAE encoder/decoder we simplified away
    - detr/models          the DETR-style transformer our from-scratch blocks mirror

demo: aloha_cube_chunk       # ensembled ACT chunk driving the handoff; optional --break no_ensemble panel

# All reference metrics: seed 0, cpu, mujoco 3.10.0 / torch 2.10.0 / lerobot
# 0.4.4 / numpy 2.4.6. The demos are the deterministic scripted expert (100% on
# seeds 0..49), so a learner re-running the default config reproduces these to
# the seeded band. Absolute success is modest (a tiny transformer on ~50 demos,
# trained briefly to fit a CPU laptop) so the LESSON is the delta over the
# untrained baseline and the chunking/ensembling ablations, not the headline number.
reference_run:
  provenance: "seed 0 on cpu; default config (chunk_size 8, model_dim 128, num_demos 50, epochs 400, eval_episodes 25); measured 2026-07-06"
  baseline_success_rate: 0.0       # untrained (random-init) reference, temporal ensembling
  baseline_mean_return: -320.354913
  success_rate: 0.88               # trained ACT, temporal ensembling: chunking clears a bar single-step never reaches
  mean_return: -45.84927
  final_train_loss: 0.01105
  # Ablations (same demos/epochs, only the named piece changed), measured 2026-07-06 cpu, seed 0, eval_episodes 25:
  break_no_chunk_success_rate: 0.6         # K=1: single-step BC through the transformer: the big, ROBUST drop; chunking IS the lever
  break_no_ensemble_success_rate: 0.0      # first-action-only, seed 0: see the seed-dependence note; NOT a robust number
  break_open_loop_success_rate: 0.88       # commit to the whole chunk, no mid-chunk re-query: neutral on success here (jerk shows in traces, not success)
  # HONESTY (the measured truth the prose must track):
  #  * CHUNKING helps largely and ROBUSTLY: trained chunked 0.88 vs no_chunk 0.6
  #    at default (eval 25); at eval 50 the gap is ~0.9 vs 0.58, and it holds
  #    across seeds. This is the chapter's thesis and it is solid. K=8 also beats
  #    K=16 (0.92 vs 0.86 at eval 50), the "tune chunk under the ~27-step
  #    episode" lesson, measured.
  #  * TEMPORAL ENSEMBLING's effect on SUCCESS is SEED-DEPENDENT, not a clean win.
  #    All at eval_episodes 25 (the default): seed 0 no_ensemble = 0.00
  #    (catastrophic: the env's threshold weld-grasp makes grip timing marginal,
  #    and the temporal average is what tips the gripper over CLOSE_FRAC to latch
  #    the grasp; seed 0 WITH ensembling = 0.88), but seed 1 no_ensemble = 0.96 vs
  #    seed 1 ensemble = 0.88: dropping the ensemble costs nothing there. The prose
  #    does not claim ensembling reliably raises success; its RELIABLE contribution
  #    is trajectory smoothness (visible in eval/*/action traces) and robustness to
  #    real-robot observation noise this clean sim lacks. The seed-0 collapse is
  #    shown as a vivid, honestly captioned seed-dependent illustration: that
  #    brittleness is chapter 1.6's thesis.
  #  * eval_episodes is 25 by default, so break rates carry ~1-2 episode noise;
  #    only the no_chunk direction is robust to seed and eval size.

# Reference bands + provenance for the exercise checks (exercise-spec: seeded
# band with provenance, not a bare magic number). checks.py reads these instead
# of inlining tolerances. The reproduce checks train a policy (~minutes on CPU)
# and are @pytest.mark.slow, excluded from `make check`; the fast prediction/unit
# gates do not depend on the reproduce bands.
exercise_checks:
  exercise_config:                 # shared reduced config for the slow reproduce checks (kept small so a check trains in a few minutes)
    chunk_size: 8
    model_dim: 64
    num_demos: 30
    epochs: 200
    eval_episodes: 10
    provenance: "measured 2026-07-07, seed 0, cpu, at this reduced config: trained chunked success 0.70, mean_return -87.23 vs untrained baseline -327.42 (gain 240.19); no_chunk (K=1) success 0.00. The DIRECTION (trained >> baseline; chunk >> no_chunk) is robust; the reproduce checks gate on direction/margin, not the exact rates."
    min_return_gain: 5.0           # trained mean_return must beat untrained baseline by at least this (measured margin is ~240 at this reduced config, ~275 at default; 5.0 is a deliberately conservative floor)
  ex1:                             # ex1_predict_chunk_vs_baseline.py (predict-then-run)
    answer: "B"                    # the chunked policy beats the untrained baseline; chunking is the point
  ex2:                             # ex2_predict_chunk_vs_single.py (predict-then-run)
    answer: "A"                    # chunking (K>1) beats single-step (K=1): the robust core ablation
  ex3:                             # ex3_bughunt_chunk_indexing.py (bug-hunt)
    # No numeric band: the shipped bug marks the padded tail valid, corrupting the
    # end-of-episode training signal. checks.py verifies this structurally: the
    # fast test asserts the fixed mask matches the reference (targets unchanged),
    # and the slow reproduce test confirms the correctly-masked pipeline trains and
    # beats baseline. The bug's effect on task success is deliberately NOT gated:
    # at this tiny config it need not show a large success delta (the cube is often
    # already delivered before the padded tail), which is itself the lesson: a
    # training-signal bug the loss curve and success rate can both hide.
  ex4:                             # ex4_completion_temporal_ensemble.py (code-completion)
    rel_tol: 1.0e-6                # completed ensemble weights must match the reference on the fixture

