demo: diffusion_multimodality   # 2D toy panel (ring: diffusion vs regression); PushT policy panel BLOCKED on contract v2

# All reference metrics: seed 0, cpu, mujoco 3.10.0 / torch 2.10.0 / lerobot 0.4.4
# / numpy 2.4.6. The demos are the deterministic scripted expert. The chapter's
# THESIS is multimodality and it lives in the 2D TOY, where the contrast is
# decisive and reproducible (diffusion 8/8 angular modes vs regression 0/8). The
# PushT policy is a working generative policy that beats the untrained baseline;
# its absolute success is modest (single-action MLP denoiser, brief CPU training),
# so the lesson there is the DELTA over baseline and the Break-It signatures, not
# the headline number — same honest framing as ch1.1/1.3.
reference_run:
  provenance: "seed 0 on cpu; default config (denoising_steps 100, model_dim 128, num_demos 100, epochs 300, eval_episodes 20); measured 2026-07-06"
  # --- the multimodality proof (2D toy) — the decisive, reproducible result ---
  toy_diffusion_modes_covered: 8      # of 8 angular sectors — diffusion covers the whole ring
  toy_diffusion_mean_radius: 0.870782 # samples sit ON the ring (target radius 1.0)
  toy_diffusion_ring_hit: 0.3035      # fraction within 0.2 of radius 1 (secondary; mode coverage is the headline)
  toy_regress_modes_covered: 0        # the MSE regressor covers NO modes
  toy_regress_mean_radius: 0.057346   # it collapses to the dead center — the average of every direction
  toy_final_loss: 0.392179
  # --- the policy (working generative policy, beats the untrained baseline) ---
  success_rate: 0.25                  # trained diffusion policy, held-out seeds
  mean_return: -111.957784
  baseline_success_rate: 0.0          # untrained (random-init) denoiser reference
  baseline_mean_return: -120.254784
  final_train_loss: 0.317269
  # Seed robustness (no-scheduler config, cpu, eval_episodes 20): seed0 0.25/-112,
  # seed1 0.25/-107, seed2 0.15/-115 — trained beats baseline (0.0/-120..-126) on
  # BOTH success and return across seeds. The success MARGIN is the robust signal.
  # Break-It signatures (same seed 0, measured 2026-07-06 cpu):
  break_few_steps_success_rate: 0.0        # denoising_steps forced to 2: under-denoised actions -> policy collapses
  break_few_steps_toy_modes: 7             # toy also degrades: 8/8 -> 7/8, mean_radius 0.87 -> 0.70 (samples pulled off the ring)
  break_few_steps_train_loss: 0.139824     # NOTE the trap: training loss is LOWER (a 2-step schedule is easier to fit) yet SAMPLES are worse
  break_wrong_schedule_success_rate: 0.0   # near-zero betas: the model never learns the trip back from noise
  break_wrong_schedule_toy_radius: 1.213139 # toy overshoots the ring (radius 1.21) and train_loss stays ~1.0 (never learns)
  # HONESTY (author MUST keep this framing — it is the measured truth):
  #  * The TOY multimodality result is the chapter's rock: 8/8 vs 0/8 modes,
  #    radius 0.87 vs 0.06, reproducible across seeds. Lead with it.
  #  * The POLICY beats the untrained baseline reliably (success 0.15-0.25 vs 0.0),
  #    but it does NOT beat ch1.1 BC (~0.3) — single-action diffusion's sampling
  #    noise is a liability on this mildly-multimodal task, where BC's mean is a
  #    fine controller. That is honest and is the setup for ch1.5 (flow matching)
  #    and for real Diffusion Policy's action-horizon (see "What we cut").
  #  * We DON'T cosine-decay the lr (BC/ACT do): a decayed diffusion run drops
  #    BELOW the untrained baseline — the denoiser must keep fitting noise at all
  #    levels. Measured, and narrated inline; do not "restore" the scheduler.

# Reference bands + provenance for the exercise checks (exercise-spec: seeded band
# with provenance, not a bare magic number). checks.py reads these instead of
# inlining tolerances. The reproduce checks train (~minutes on CPU) and are
# @pytest.mark.slow — excluded from `make check`, which runs only the fast
# math/prediction gates (ex3 forward-noise bug-hunt, ex4 reverse-step completion).
exercise_checks:
  exercise_config:                 # shared reduced config for the slow reproduce checks (kept small so a check trains in a few minutes)
    denoising_steps: 50
    model_dim: 64
    num_demos: 30
    epochs: 150
    eval_episodes: 10
    provenance: "PENDING — measure with diffusion.py at this reduced config, seed 0, cpu; the DIRECTION (toy: diffusion covers modes >> regression; few_steps under-denoises) is robust, the exact band author-confirms"
    min_radius_gap: 0.3            # toy: diffusion mean_radius must beat regression's by >= this (measured margin at default ~0.81; conservative here)
    min_mode_gap: 4               # toy: diffusion must cover >= regression + this many angular modes (measured margin at default is 8)
  ex1:                             # ex1_predict_multimodality.py (predict-then-run)
    answer: "B"                    # diffusion covers all modes; regression collapses to the empty center
  ex2:                             # ex2_predict_denoising_steps.py (predict-then-run)
    answer: "B"                    # 2 denoising steps under-denoise the ring — worse, not better
  ex3:                             # ex3_bughunt_forward_noise.py (bug-hunt, fast)
    provenance: "self-contained numpy fixture; the fix restores the variance-preserving sqrt(1-acp) noise coefficient"
  ex4:                             # ex4_completion_reverse_step.py (code-completion, fast)
    rel_tol: 1.0e-6                # completed posterior mean must match the reference on the fixture

