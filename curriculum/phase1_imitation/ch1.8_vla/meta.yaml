  commit: 8fff0fde7c79f23a93d845d1a50e985de01f8b8a   # tag v0.4.4 (SmolVLA source present at src/lerobot/policies/smolvla/; matches the course-pinned lerobot); pinned 2026-07-07
  focus:
    - "the VLM backbone that fuses image + language (real: pretrained SigLIP + LM; ours: a frozen random CNN feature + a from-scratch token embedding, fused by from-scratch attention)"
    - "how the action expert is conditioned on the fused representation (real + ours: a flow-matching velocity head — the ch1.5 mechanism)"
    - "the tokenizer (real: a pretrained subword tokenizer; ours: ch1.7's 46-word fixed vocab)"

demo: vla_rollout           # a PushT rollout of the language-conditioned policy + the CLS-attention bar; BLOCKED on the flow-sampler contract v2 (ch1.5), same as the flow policy panel

# All reference metrics: seed 0, cpu, mujoco 3.10.0 / torch 2.10.0 / lerobot 0.4.4
# / numpy 2.4.6. Env resets + rendering are bitwise on CPU; the frozen encoder init is
# seeded; TRAINING is statistically reproducible (CPU: the smoke metrics.json is
# byte-identical twice-run; the full policy's success is a NOISY 12-episode rate, ch1.6).
# THE HONEST HEADLINE is a TRADEOFF, not a triumph: the from-scratch VLA LEARNS PushT
# (0.42-0.58 across seeds, vs an untrained 0.0), but that task is solvable from STATE —
# and --break blind proves the policy uses its RANDOM vision for ~nothing (blind PushT ==
# sighted PushT). ALOHA's bimanual handoff it cannot do (0.0 every seed). That is the
# case for a PRETRAINED backbone (the SmolVLA Scale Lab).
reference_run:
  provenance: "seed 0 on cpu; default config (model_dim 64, layers 2, heads 4, hidden 128, flow_steps 6, epochs 200, episodes_per_task 60, eval_episodes 12); measured 2026-07-06. ARCHITECTURE-SENSITIVITY (unlike the state-based Phase-1 chapters): this VLA trains on rendered IMAGE features, and MuJoCo rasterization is NOT bitwise across CPU architectures, so over 200 epochs the exact PushT % can vary with the CPU rasterizer (measured ~0.58 on BOTH the reference x86 run and an Apple Silicon arm64 CPU run — treat the % as approximate, not the ~0.25 an earlier non-default setup produced). The ROBUST, reproducible claim the exercise gates assert is the DIRECTION — trained >> untrained 0.0 every seed/platform, ALOHA 0.0 — NOT the exact 0.58. Same-machine runs are byte-deterministic."
  num_examples: 2984                 # ch1.7 pipeline re-run at 60 episodes/task (the VLA needs more than ch1.7's 12-episode inspection default)
  vocab_size: 46                     # ch1.7's from-scratch word-level vocab
  feature_dim: 64                    # ch1.7's frozen CNN width; rebuilt here to featurize live eval frames
  final_train_loss: 0.28249          # masked flow-matching velocity MSE (per-example averaged; not comparable to ch1.5's)
  # --- the policy: from-scratch VLA LEARNS the state-solvable task, beats untrained ---
  pusht_success_rate: 0.583333       # trained, held-out eval seeds (N=12)
  pusht_success_ci_lo: 0.319511      # Wilson 95%
  pusht_success_ci_hi: 0.80674
  pusht_mean_return: -48.342736
  baseline_pusht_success_rate: 0.0   # untrained (random-init) VLA reference — the trained gap is real
  baseline_pusht_mean_return: -104.166445
  # --- the honest limit: ALOHA's bimanual handoff fails ---
  aloha_success_rate: 0.0            # trained, N=6 (half of pusht — it is far harder)
  aloha_success_ci_hi: 0.390334      # a Wilson interval on 0/6 is [0, 0.39]: 0 with this few episodes is "we can't distinguish it from very low"
  aloha_mean_return: -264.717274     # WORSE than an untrained PushT drift — the shared tiny capacity + random vision can't coordinate a handoff
  # Seed robustness (default config, cpu, measured 2026-07-06): PushT trained
  # seed0 0.58, seed1 0.58, seed2 0.42 — ABOVE the untrained 0.0 on EVERY seed; ALOHA
  # 0.0 on every seed. The direction (trained>>untrained on PushT; ALOHA fails) is the rock;
  # the exact PushT % is a noisy 12-episode rate (ch1.6 — report the interval, not the point).
  # --- the Break-It: the random-vision channel is not load-bearing ---
  break_blind_pusht_success_rate: 0.583333   # --break blind zeros the image feature (train+eval): PushT is UNCHANGED (0.58 == 0.58)
  break_blind_pusht_mean_return: -41.906     # if anything marginally better — the from-scratch RANDOM vision added nothing; PushT is solved from STATE
  # HONESTY (author MUST keep this framing — it is the measured truth):
  #  * This is the TRADEOFF chapter (map: from-scratch vs adapt-pretrained). Lead with
  #    the tradeoff, NOT a headline %. The from-scratch VLA WORKS on PushT (0.42-0.58 >>
  #    untrained 0.0, every seed) — real, but MODEST and over a noisy 12-episode metric.
  #  * DO NOT sell PushT 0.58 as strong VLA perception. PushT is solvable from the STATE
  #    alone (ch1.1 BC does it from state), and --break blind proves the policy ignores
  #    its vision (blind == sighted). The language + the random-init image feature are
  #    NOT doing the work here. Say so plainly.
  #  * ALOHA is 0.0 on every seed. A tiny shared-capacity VLA with a random vision encoder
  #    and no action chunking (ch1.3) cannot coordinate the bimanual handoff. This is the
  #    honest ceiling, not a bug to fix. Frame it as the motivation for a real backbone.
  #  * The vision encoder is ch1.7's FROZEN, RANDOM-INIT conv stack, rebuilt here. It is a
  #    fixed projection, NOT perception. A PRETRAINED SigLIP/DINOv2 backbone (SmolVLA,
  #    OpenVLA) is what makes vision + language actually load-bearing — that is the Scale
  #    Lab and the whole reason to prefer adapt-pretrained when performance matters.
  #  * The multi-task loss is MASKED and PER-EXAMPLE averaged so a 2-D PushT frame and a
  #    6-D ALOHA frame weigh equally; summing lets ALOHA's 6 dims dominate and starve
  #    PushT (measured: unbalanced, PushT collapsed to 0.0). Keep the balancing.

# Reference bands + provenance for the exercise checks (exercise-spec: seeded band with
# provenance, not a bare magic number). checks.py reads these instead of inlining
# tolerances. The two self-contained gates (ex3 masked-loss bug-hunt, ex4 attention
# completion) are FAST + deterministic and run in `make check`. The two reproduce checks
# (ex1 blind==sighted, ex2 pusht>>aloha) TRAIN the policy and are @pytest.mark.slow —
# excluded from `make check`, which runs only the fast gates.
exercise_checks:
  exercise_config:                 # the FULL default config: the policy needs 60 demos/task to leave 0.0 (a reduced budget yields 0.0 for BOTH tasks, like ch1.5's reduced policy), so the SLOW reproduce checks train at defaults and assert the seed-0 DIRECTION, not the %.
    episodes_per_task: 60
    epochs: 200
    eval_episodes: 12
    model_dim: 64
    hidden: 128
    provenance: "measured 2026-07-06, vla.py at default config, seed 0, cpu: PushT trained 0.58 (untrained 0.0), blind PushT 0.58 (== sighted), ALOHA trained 0.0. CPU training is deterministic so seed-0 reproduces; the checks assert the DIRECTION (trained>>untrained; blind~=sighted; pusht>>aloha), which is seed-robust (PushT 0.42-0.58 across seeds 0/1/2, always >> 0.0)."
    min_trained_over_untrained: 0.15   # ex1/ex2: trained PushT rate must beat untrained by >= this (measured seed-0 margin 0.58; seed-robust >= 0.42)
    max_blind_drop: 0.25               # ex1: blind PushT must NOT fall more than this below sighted (measured: 0.0 drop — blind == sighted)
    min_pusht_over_aloha: 0.15         # ex2: PushT trained rate must beat ALOHA trained rate by >= this (measured: 0.58 vs 0.0)
  ex1:                             # ex1_predict_blind.py (predict-then-run; SLOW)
    answer: "B"                    # zeroing vision barely changes PushT — the from-scratch random-vision channel isn't load-bearing (PushT is state-solvable)
  ex2:                             # ex2_predict_pusht_vs_aloha.py (predict-then-run; SLOW)
    answer: "A"                    # the tiny VLA learns the state-solvable PushT but fails ALOHA's bimanual handoff
  ex3:                             # ex3_bughunt_masked_loss.py (bug-hunt, fast)
    provenance: "self-contained torch fixture; the fix restores the PER-EXAMPLE masked average so a 2-D and a 6-D embodiment weigh equally (the sum-then-divide version lets the 6-D task dominate)"
  ex4:                             # ex4_completion_attention.py (code-completion, fast)
    abs_tol: 1.0e-5              # a correct scaled-dot-product attention matches the reference within this

