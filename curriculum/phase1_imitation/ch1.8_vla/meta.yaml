id: ch1.8-vla
title: "The Tiny VLA II: Train It"
artifact: vla.py             # target ~400 LOC (built to 449, hard cap 450: a from-scratch tiny-VLM fusion backbone + the ch1.5 flow-matching action head + multi-task masked training + ch1.6-style error-bar eval, one file)
task: multi-task            # trains on ch1.7's pusht+aloha pile; evaluates on curriculum/common/envs/pusht AND aloha_cube

# NOTE (doctrine): this is a "tiny VLA" chapter, but the VLM backbone (token embedding
# + from-scratch multi-head self-attention) and the vision encoder (ch1.7's frozen conv
# stack, rebuilt here) are ALL built from scratch — NO transformers import. So
# `allow_transformers` stays UNSET and the forbidden-imports gate runs at full
# strictness. A REAL pretrained backbone + subword LM is the Scale Lab (SmolVLA), which
# this chapter reaches for by REFERENCE, not by import.

objectives:
  - Fuse the three VLA inputs (instruction tokens, a frozen image feature, and state) into ONE conditioning vector with a tiny transformer built FROM SCRATCH — token embedding + a few multi-head self-attention blocks (attention is Q/K/V nn.Linear + a scaled-dot-product softmax; no transformers/einops) — and read the fusion off a CLS token.
  - Condition the ch1.5 FLOW-MATCHING action head on that fused vector (velocity objective + forward-Euler ODE sampler, reused honestly) and train the whole policy on ch1.7's multi-task .npz, with a MASKED loss that weighs a 2-D PushT frame and a 6-D ALOHA frame equally (so the higher-DOF embodiment does not dominate the gradient — measured).
  - Evaluate with ch1.6 rigor — a Wilson 95% interval on a noisy success rate, plus mean_return as the learning signal when success is 0 — on BOTH the PushT and ALOHA envs, rebuilding ch1.7's frozen encoder to featurize live frames.
  - Measure, and frame honestly, what a tiny FROM-SCRATCH VLA can and cannot do: it learns the state-solvable PushT task well, essentially cannot do ALOHA's bimanual handoff, and — the Break-It — barely uses its RANDOM-init vision at all. That gap is exactly why real VLAs adapt a PRETRAINED backbone + LM (SmolVLA); from-scratch teaches the mechanism, adapt-pretrained is what performs.

scale_lab: true
# The map's ch1.8 SL is the APPROVED reinstatement: fine-tune SmolVLA (a real pretrained
# VLA — SigLIP vision + a pretrained LM tokenizer + a flow-matching action expert) on a
# consumer GPU, and compare to this from-scratch policy. This DRAFT ships the free-tier
# from-scratch core only and REFERENCES the SL; it does not implement it (SmolVLA is a
# heavy pretrained model, off the free-tier floor, and its from-scratch counterpoint is
# the whole point of this chapter). Author: wire scale_lab_ref to the SmolVLA study once
# it exists and have wallclock-bench MEASURE the GPU tier — do not assert a scaling claim.
# The lesson is the TRADEOFF (from-scratch vs adapt-pretrained), and this chapter's
# measured from-scratch numbers below are one honest half of it.

# READ-THE-REAL-THING: the map pairs this chapter with the SmolVLA source. The rtrt:
# block is LEFT FOR THE AUTHOR to pin — I did not have a verified offline commit sha and
