# "seeded-run band with provenance", not a bare magic number). checks.py reads
# these instead of hardcoding tolerances.
# PROVENANCE: seed sweep 0-4 on cpu, torch 2.10.0 / mujoco 3.10.0 / numpy 2.4.6;
# DEFAULT config (total_steps 200000, num_envs 8, num_steps 256); measured 2026-07-06.
exercise_checks:
  ex1:                     # ex1_completion_gae.py — DETERMINISTIC (toy arrays, no training)
    provenance: "pure-function GAE on a fixed 6-step toy rollout; no RL variance; deterministic (checks.py reference_gae)"
    truncated_minus_terminated_adv_min: 5.0   # measured 8.9 on the toy rollout; margin below it
  ex2:                     # ex2_predict_ablation.py — trains PPO, multi-seed, seeded => reproducible
    provenance: "cpu, default config (total_steps 200000), seeds 0-2; measured 2026-07-06: ref [500,500,500], no-norm-adv [332,500,500]"
    ref_eval_min: 450.0                        # reference reliably SOLVES (mean over seeds 0-2 = 500; min seed 465 at N=5)

