id: ch2.1-ppo
title: "PPO: The Policy That Acts and Sees the Consequences"
artifact: ppo.py           # 349 LOC (measured); target ~380, hard cap 450
task: cartpole             # curriculum/common/envs/cartpole: continuous force, reward +1/step
dataset:
  reference: null          # RL generates its own data by acting; no demo dataset
  learner_path: false
objectives:
  - Implement PPO from scratch in one file: Gaussian policy, value net, GAE, clipped surrogate
  - Explain why acting-and-observing escapes the covariate shift that killed behavior cloning (ch1.1)
  - Bootstrap correctly on truncation vs termination, and measure what conflating them costs
  - Ablate the standard PPO tricks (advantage norm, value clipping, GAE-lambda, lr anneal) via flags
scale_lab: false
read_the_real_thing: true
rtrt:
  repo: vwxyzjn/cleanrl
  commit: c37a3ec4ef8d33ab7c8a69d4d2714e3817739365   # tag v1.0.0; pinned 2026-07-07 (API-verified)
  focus:
    - ppo_continuous_action.py   # the single-file (~330 LOC) PPO this chapter mirrors: the LOC sanity check + the GAE/clipped-surrogate idiom
demo: cartpole_ppo_balance   # hero: trained PPO balances live; visitor nudges the cart, policy recovers

