id: ch2.2-sac
title: "SAC and the Off-Policy Bargain"
artifact: sac.py           # 387 LOC (measured); target ~350, hard cap 450
task: pusher_reach         # curriculum/common/envs/pusher_reach: dense reward (-distance), continuous torque
dataset:
  reference: null          # RL generates its own data by acting; no demo dataset
  learner_path: false
objectives:
  - Implement SAC from scratch in one file, with a squashed-Gaussian policy (reparam + tanh log-prob correction), twin Q critics + target networks, auto-tuned entropy temperature, soft target updates
  - Explain the off-policy bargain, why a replay buffer reuses each transition many times, and the instability (Q divergence) that twin-Q + target nets + entropy tame
  - Measure, don't assert, that off-policy SAC is more SAMPLE-EFFICIENT than on-policy PPO on the dense-reward pusher-reach (env-steps-to-solve, head-to-head)
  - State WHEN off-policy wins (dense reward + cheap env + heavy sample reuse) and when it does not
companion_tooling:
  # NOT the artifact (LOC-exempt, forbidden-imports still enforced). Holds the
  # measured SAC-vs-PPO comparison that does not fit under sac.py's 450 cap:
  # the ch2.1 spike H3 finding applied. The on-policy reference is a compact
  # from-scratch PPO (ch2.1 family), not a framework.
  - compare_ppo_sac.py
scale_lab: false           # map lists ch2.2 tier T4; free-tier CPU config measured. A 4090 SL (bigger buffer/nets, PushT-dense) is a future add, not this draft.
read_the_real_thing: true
rtrt:
  repo: vwxyzjn/cleanrl
  commit: c37a3ec4ef8d33ab7c8a69d4d2714e3817739365   # tag v1.0.0; pinned 2026-07-07 (API-verified)
  focus:
    - sac_continuous_action.py   # the single-file (~280 LOC) SAC this chapter mirrors: squashed-Gaussian + twin-Q + alpha-autotune
demo: pusher_sac_reach     # hero: trained SAC arm reaches; visitor drags the target, the arm re-reaches

# Reference metrics + seeded bands for the exercise checks (exercise-spec:
# "seeded-run band with provenance", not a bare magic number). checks.py reads
# these instead of hardcoding tolerances.
# PROVENANCE: seed sweep 0-2 on cpu, torch 2.10.0 / mujoco 3.10.0 / numpy 2.4.6;
# EXERCISE config (total_steps 15000, buffer_size 100000 default); measured 2026-07-06.
# H2 note (ch2.1 spike): the graded assertion is the STRONG learns-signal over N
# seeds (eval final distance clearly below the random baseline), never a flaky
# single-run effect. At the full 30k default the seed-0 run solves (<0.05m) at
# 18000 env steps; at the 15k exercise budget it reaches ~0.065 m, well below the
# random 0.176 m baseline on every seed, but short of the 0.05 m solve bar (so the
# bands assert "clearly learned", not "solved").
exercise_checks:
  ex1:                     # ex1_predict_multiseed.py: trains SAC on seeds 0-2 (each seed bit-reproducible on CPU)
    provenance: "cpu, seeds 0-2, total_steps 15000; measured 2026-07-06: final_dist [0.0735, 0.0718, 0.0495] m, mean 0.0649 (random ~0.176)"
    learns_mean_dist_max: 0.11       # measured mean 0.0649; margin to 0.11, still far below random 0.176
    learns_per_seed_dist_max: 0.13   # measured worst seed 0.0735; every seed beats random by a clear margin
  ex2:                     # ex2_investigate_replay.py: default vs 20x-smaller replay, seeds 0-2
    provenance: "cpu, seeds 0-2, total_steps 15000; measured 2026-07-06: default mean 0.0649 m vs small-buffer(2000) mean 0.0876 m (worse on all 3 seeds)"
    default_learns_mean_dist_max: 0.11   # default reliably learns (strong signal); the replay-shrink effect is observational (measured: shrinking hurts, but only by ~0.02 m at this budget)

