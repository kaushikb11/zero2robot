id: ch2.3-mjx
title: "4096 Robots at Once: PPO on MJX"
artifact: ppo_mjx.py       # 415 LOC (measured); target ~350, hard cap 450. Over target: PPO + a
                           # from-scratch functional MJX env + the sweep + a jax-vs-torch primer in one
                           # file. The ch2.1 spike (H3) anticipated RL chapters running over the ~350
                           # target; this stays well under the 450 hard cap with the full story intact.
task: cartpole             # curriculum/common/envs/cartpole/cartpole.xml, loaded into MJX (mjx.put_model)
framework: jax             # THE curriculum's one deliberate JAX excursion (infra/decisions/015). Pure
                           # jax/flax/optax + mujoco.mjx; NO torch. The other ~33 chapters stay torch.
dataset:
  reference: null          # RL generates its own data by acting; no demo dataset
  learner_path: false
objectives:
  - Re-express ch2.1's PPO functionally in JAX/MJX — the SAME algorithm (Gaussian policy, GAE, clipped surrogate, minibatch epochs), now vmapped over N parallel MJX envs and jitted into one XLA program
  - Make the mental-model shift from torch to jax — pure functions, params-as-data pytrees, explicit PRNGKey threading, vmap/jit — without getting lost (the in-file primer)
  - Measure the WALL-CLOCK CLIFF — throughput (env-steps/sec) vs --num_envs — and read where it plateaus on your tier
  - Reason about the throughput-vs-gradient-quality tradeoff: more parallel envs buy more data/sec but, at a fixed env-step budget, fewer gradient updates

# The 4096-robot headline needs a GPU; the free-tier config is a small env-count
# on CPU-jax, honestly labeled. scale_lab true => the 4096/4090 env-count
# scaling-law study is the Scale Lab (referenced, not run on the free tier).
scale_lab: true
scale_lab_ref: >
  Scale Lab (4090 / L40S, jax[cuda]): sweep --num_envs to 4096 and chart the
  env-count scaling law where CPU-jax cannot — on a GPU the throughput curve
  keeps climbing past the CPU plateau (~256 envs here), and 4096 envs is where
  PPO's parallel-sim throughput actually pays off. The lesson (throughput vs
  gradient quality) is measured small on CPU-jax and re-measured large on GPU.
  PENDING a GPU runner (infra/decisions/014 Modal L40S).

read_the_real_thing: true
# read_the_real_thing block LEFT FOR THE AUTHOR (read-the-real-thing skill pins the
# real upstream commit; do NOT invent a sha). Candidate anchors, all jax:
#   - Brax PPO (google/brax, brax/training/agents/ppo) — the canonical parallel-env PPO
#   - PureJaxRL (luchris429/purejaxrl) — single-file jitted PPO, the closest match to this file's shape
#   - MJX itself (google-deepmind/mujoco, mjx/) — mjx.step / mjx.make_data, the sim this chapter vmaps
# The point of the segment: this file IS the from-scratch version; the learner graduates to Brax/PureJaxRL.

demo: mjx_parallel_training   # live parallel-training viz: many envs training at once + the throughput/return curves

# MEASURED reference run — provenance for the exercise bands + the wall-clock cliff.
# PROVENANCE: cpu-jax (JAX_PLATFORMS=cpu), darwin/arm64; jax 0.10.2, mujoco-mjx 3.10.0,
# flax 0.12.7, optax 0.2.8; DEFAULT config (total_steps 300000, num_envs 64, num_steps 128,
# update_epochs 4); measured 2026-07-06. GPU numbers are STATISTICAL only (jax/XLA GPU
# nondeterminism) and PENDING a runner — free-tier CPU-jax is BITWISE-deterministic (verified 2x).
reference_run:
  free_tier_learning:
    config: "num_envs 64, num_steps 128, total_steps 300000 => 36 gradient updates"
    eval_return_seed0: 407.2     # cap 500; random baseline ~10-30
    eval_return_seed1: 499.7     # seed band: both seeds clearly solve (min 407 over seeds 0-1)
    wallclock_min_cpu_laptop: 0.51
  wall_clock_cliff:              # env-steps/sec from --sweep on cpu-jax; TIMING (not bitwise), representative
    note: "throughput CLIMBS with parallel envs then PLATEAUS/REVERSES on CPU (~256 envs); a GPU keeps climbing to 4096"
    num_envs_16: 50154
    num_envs_64: 83638
    num_envs_256: 104544        # CPU peak — the plateau
    num_envs_1024: 76387        # PAST the plateau throughput FALLS on CPU (cores saturate); this is the Scale-Lab boundary
  throughput_vs_gradient_quality:
    note: "at a FIXED 300000 env-step budget, MORE envs = FEWER gradient updates => worse learning despite higher throughput"
    num_envs_64_updates_36_eval: 407.2
    num_envs_256_updates_9_eval: 90.4   # runs FASTER (104k+ env-steps/s) but learns WORSE (only 9 updates)

# Reference bands for the exercise checks (exercise-spec: seeded/measured band with
# provenance, not a bare magic number). checks.py reads these.
exercise_checks:
  ex1:                     # ex1_predict_throughput_cliff.py — throughput sweep; TIMING, so bands are loose/qualitative
    provenance: "cpu-jax --sweep 16,256; measured 2026-07-06: 50154 vs 104544 env-steps/s. Timing varies by machine; the check asserts only the QUALITATIVE climb (256 clearly > 16)."
    throughput_256_over_16_min: 1.3    # parallelism must clearly raise throughput from 16->256 envs (measured ~2.08x; loose floor for slow machines)
  ex2:                     # ex2_investigate_env_count.py — trains PPO at two num_envs, seeded => reproducible
    provenance: "cpu-jax, default total_steps 300000, seed 0: num_envs 64 (36 updates) eval 407.2; num_envs 256 (9 updates) eval 90.4. Measured 2026-07-06."
    ref_num_envs64_eval_min: 350.0     # num_envs 64 reliably solves at the default budget (seed 0 = 407, seed 1 = 500)
    solve_over_fast_margin: 150.0      # 64-env eval must beat 256-env eval by this much (measured gap ~317) — the throughput!=learning point

