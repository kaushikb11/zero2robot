id: ch2.6-perturb
title: "Sim-to-Real Intuition Lab I: Latency & Noise"
artifact: perturb.py       # 376 LOC (measured); target ~250, hard cap 450 (two-task lab: cartpole PPO + pusher SAC)
task: cartpole + pusher_reach   # reuses ch2.1 PPO (cartpole) and ch2.2 SAC (pusher_reach); no new env
dataset:
  reference: null          # no dataset — this chapter re-EVALUATES trained policies, it does not train
  learner_path: false
objectives:
  - Name the three dominant sim-to-real perturbations — sensor noise, observation LATENCY, and model mismatch (mass/damping/gravity) — and inject each into a trained policy's eval loop
  - Build the mechanisms from scratch — gaussian obs noise, a ring-buffer latency delay, and in-place MjModel physics scaling — with nothing hidden behind a wrapper
  - MEASURE the degradation curve (success rate falling as each perturbation grows) and read off WHICH perturbation a clean-trained policy is most brittle to — for the ch2.1 PPO balancer, that is latency, not noise or gravity
  - Carry the ch1.6 honesty over: perturbed eval is noisy, so the graded signal is a seed-robust structural fact (baseline holds, extreme latency breaks), never one dramatic run
  - Motivate ch2.7 — a policy trained in ONE clean world has no defense it was never asked to learn; domain randomization trains ACROSS the gap

# The policies perturbed here are TRAINED by ch2.1 (ppo_agent.pt) and ch2.2
# (sac_actor.pt). NO policy binary ships (.pt is gitignored, root invariant 5):
# the artifact loads a checkpoint the learner trained, and falls back to the
# chapter's scripted baseline controller (rebuilt to read the OBSERVATION, so it
# degrades under the same noise/latency) when no checkpoint is present — always
# under --smoke, for hermetic CI.
policies:
  cartpole: outputs/ch2.1-ppo/ppo_agent.pt    # ch2.1 PPO actor; scripted fallback = common/envs/cartpole.balance_action, rebuilt from obs
  pusher_reach: outputs/ch2.2-sac/sac_actor.pt  # ch2.2 SAC actor; scripted fallback = common/envs/pusher_reach.reach_action, rebuilt from obs

scale_lab: false           # map lists ch2.6 tier CPU/T4; free-tier CPU config measured. Perturbing a bigger quadruped policy is a future SL, not this draft.
read_the_real_thing: true
# read_the_real_thing block LEFT FOR THE AUTHOR. Anchors are the sim-to-real /
# domain-gap literature the chapter previews: latency & system-identification in
# sim-to-real transfer, and the observation-delay handling in real robot stacks.
# Do NOT invent a commit sha or DOI here; the read-the-real-thing skill pins the
# real upstream source when the study segment is authored.
demo: cartpole_latency_degrade   # hero: the same trained balancer, clean vs +4-step observation latency, side by side — it falls

# Reference metrics + seeded bands for the exercise checks (exercise-spec:
# "seeded-run band with provenance", not a bare magic number). checks.py reads
# these instead of hardcoding tolerances.
# PROVENANCE: measured 2026-07-06 on cpu, torch 2.10.0 / mujoco 3.10.0 / numpy 2.4.6.
# Both exercises TRAIN the ch2.1 PPO cartpole policy (default 200k steps, seeded =>
# bit-reproducible on CPU) and then sweep perturbations, so the per-seed numbers do
# not flake run-to-run; the variance the chapter teaches is ACROSS perturbation
# magnitude, and the graded fact is a seed-robust STRUCTURAL claim (ch2.1 spike H1/H2:
# no single-run break-it — the degradation is asserted as clean-holds / extreme-breaks).
reference_run:
  # Learned PPO (cartpole), sweep at eval_episodes 20, seeds 0-2:
  #   baseline success 1.00 (all seeds) | sensor_noise@0.2 success [1.00, 0.75, 1.00]
  #   latency@4 success [0.00, 0.05, 0.30] | latency@8 success [0.00, 0.00, 0.00]
  #   model_mismatch gravity@[0.5..2.0] success 1.00 everywhere | worst_perturbation = latency (all seeds)
  # Reading: the clean-trained balancer tolerates sensor noise and gravity mismatch
  # but falls off a stability cliff between 2 and 4 steps (40-80 ms) of observation
  # latency. WHICH perturbation hurts most is the lesson; that it is latency (a thing
  # DR alone does not fix) is the seam into ch2.7.
  # Learned SAC (pusher_reach, default 30k), sweep at eval_episodes 20, seed 0:
  #   baseline success 0.70 (mean_final_dist 0.039 m) | sensor_noise@0.2 success 0.35
  #   latency@8 success 0.50 | model_mismatch mass@[0.5..3.0] success 0.70 everywhere
  #   worst_perturbation = sensor_noise
  # Reading (the payoff of running BOTH policies): the reach/settling task is the
  # MIRROR of cartpole — it tolerates latency (a slow reacher can arrive late) but
  # is brittle to sensor noise, and gravity is a genuine NO-OP on the planar arm
  # (mass is its sharp knob, and even that the learned controller absorbs). WHICH
  # perturbation bites depends on the task's dynamics, not the algorithm.
  pusher_sac: "measured 2026-07-06, cpu, seed 0: baseline 0.70 | sensor_noise@0.2 0.35 | latency@8 0.50 | mass@[0.5..3.0] 0.70 | worst=sensor_noise"
exercise_checks:
  ex1:                     # ex1_predict_worst.py — trains PPO, sweeps 3 perturbations, seeds 0-2
    provenance: "cpu, learned PPO (200k), seeds 0-2; measured 2026-07-06: worst=latency all seeds; baseline success [1.0,1.0,1.0]; latency@8 success [0.0,0.0,0.0]"
    worst_perturbation: latency        # the predict-then-run answer, robust across seeds
    baseline_success_min: 0.9          # clean policy solves (measured 1.0 every seed)
    latency_extreme_success_max: 0.1   # 8-step latency breaks it (measured 0.0 every seed)
  ex2:                     # ex2_investigate_latency.py — finer latency sweep, seeds 0-2
    provenance: "cpu, learned PPO (200k), seeds 0-2; measured 2026-07-06: latency<=2 success 1.0 all seeds; latency>=8 success 0.0 all seeds; breaking point 2-4 steps"
    lowlat_success_min: 0.9            # <=2 steps (<=40 ms) still solved (measured 1.0)
    highlat_success_max: 0.1           # >=8 steps (>=160 ms) broken (measured 0.0)

