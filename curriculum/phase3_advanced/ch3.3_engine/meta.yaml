id: ch3.3-engine
title: "Build a Physics Engine I: Unconstrained Dynamics"
artifact: engine.py          # 269 LOC, CPU-only, pure numpy (no mujoco in the dynamics)
task: falling-bodies         # conservative test systems: an orbit, a spring, a freefall — all from-scratch numpy
objectives:
  - Represent unconstrained rigid-body state as (position q, velocity v, mass m) plus a force law force(q, v), and step it forward yourself — the update mj_step has done for you since chapter 0.1
  - Implement three integrators from scratch — explicit Euler, semi-implicit (symplectic) Euler, and RK4 — and see that they differ only in WHICH state the force and velocity are evaluated at
  - Measure ENERGY DRIFT on a conservative system as the honest error metric — explicit Euler injects energy and the orbit spirals out, semi-implicit keeps energy BOUNDED, RK4 is far more accurate per step but is not symplectic
  - Understand why an oscillatory/bounded system is what exposes the symplectic advantage (freefall drifts under every integrator) — the measured reason MuJoCo integrates the way it does

scale_lab: false
# ch3.3 is the free-tier core of the from-scratch physics arc (map: 3.3-3.6 need only
# Phase 0). The whole run is microseconds of pure-numpy integration on any CPU — there
# is nothing to scale onto a GPU. The scale knobs (--dt, --steps) are the LESSON, not a
# tier ramp: shrink --dt and every integrator's drift shrinks at its own order (Euler
# ~O(dt), RK4 ~O(dt^4)); grow --steps and Euler's secular growth pulls away while the
# symplectic energy band stays put. No Scale Lab.

