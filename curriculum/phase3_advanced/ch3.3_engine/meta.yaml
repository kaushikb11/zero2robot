    - "mjModel.opt.integrator (Euler / implicit / implicitfast / RK4): which one is the default and why"
    - "the mj_Euler / mj_RungeKutta source: the same \"evaluate the force at which state\" choice we make by hand"
    - "the docs' note on stability vs accuracy — MuJoCo's semi-implicit default is exactly this chapter's headline"

demo: engine_energy_drift    # 2D energy-vs-time panel (3 overlaid curves) + the orbit paths; pure numpy, no WASM/MuJoCo

# Reference run: the FULL default orbit (--system orbit --seed 0, dt 0.01, 2000 steps).
# All numbers seed 0 on cpu, numpy 2.4.6, measured 2026-07-06. These are the drift
# HEADLINE — the honesty metric, stated so the ordering is unmissable.
reference_run:
  provenance: "seed 0 on cpu, numpy 2.4.6; --system orbit (default), dt 0.01, 2000 steps (20 s sim time); measured 2026-07-06"
  system: orbit
  e0: -0.486210038749      # initial total energy (kinetic + gravitational potential), conserved by a perfect integrator
  # --- explicit EULER: energy RUNS AWAY, the orbit spirals outward ---
  euler_rel_final: 0.221252393919  # +22% energy gained over ~3 orbits; grows without bound as steps increase
  euler_rel_max: 0.221252393919    # worst excursion == final (monotone growth) — the runaway signature
  # --- SEMI-IMPLICIT (symplectic) Euler: energy BOUNDED, no secular growth ---
  semi_rel_final: 0.000098263658   # ~1e-4: wobbles around the true energy forever, never runs away
  semi_rel_max: 0.000320278117     # the whole excursion stays inside a tiny band (independent of run length)
  # --- RK4: far more ACCURATE per step, but NOT symplectic ---
  rk4_rel_final: -4.5e-11          # ~1e-11: essentially exact here, but the sign is one-directional (creeps, doesn't bound)
  rk4_rel_max: 5.1e-11
  # HONESTY (author MUST keep this framing — it is the measured truth):
  #  * The ORDERING is the rock and is seed-robust (checked seeds 0/1/2): Euler drift >>
  #    semi-implicit's bounded band > RK4's tiny drift. Lead with it.
  #  * Do NOT sell RK4 as "the best": it is the most ACCURATE per step but it is not
  #    symplectic — over a very long run its small error accumulates one direction, while
  #    semi-implicit's error stays bounded. That distinction is the chapter's payoff and
  #    the reason a physics engine picks a symplectic integrator over a "more accurate" one.
  #  * FREEFALL is the honest counter-example (run --system freefall): energy drifts under
  #    BOTH Euler (+) and semi-implicit (-) because the motion never returns — the symplectic
  #    advantage needs a BOUNDED/oscillatory system. Keep that caveat; it prevents the
  #    over-claim "semi-implicit always conserves energy."

# Reference bands + provenance for the exercise checks (exercise-spec: seeded band with
# provenance, not a bare magic number). checks.py reads these instead of inlining
# tolerances. All checks are pure-numpy and bitwise deterministic, so the bands are TIGHT.
exercise_checks:
  smoke_orbit:                     # engine.py --smoke --seed 0 (system orbit, 600 steps) — the signature the checks reproduce
    provenance: "seed 0 on cpu, numpy 2.4.6, --smoke (600 steps, dt 0.01); measured 2026-07-06"
    euler_rel_final: 0.08964559174
    semi_rel_final: -0.000138088326
    semi_rel_max: 0.000320275781
    rk4_negligible: 1.0e-6         # rk4's drift (~2e-11) is astronomically below this — "essentially exact"
    reproduce_abs: 1.0e-6          # engine.py's own smoke run reproduces these to well within this band
  ex1:                             # ex1_predict_conservation.py (predict-then-run)
    answer: "B"                    # explicit Euler is the one whose orbit energy grows without bound
  ex2:                             # ex2_completion_integrators.py (code-completion, RK4 + semi-implicit)
    reproduce_abs: 1.0e-12         # completed steppers must match the reference rk4/semi update to within this
  ex3:                             # ex3_dt_order_investigation.py (predict-then-run: drift vs timestep)
    answer: "C"                    # halving dt ~halves Euler drift (1st order) but shrinks RK4 drift far more steeply (4th order)
    euler_ratio_lo: 1.6           # euler_rel_final(dt) / euler_rel_final(dt/2) lands near 2 (first-order); measured 1.906
    euler_ratio_hi: 2.4
    rk4_negligible: 1.0e-6        # rk4 drift stays below this at BOTH timesteps and shrinks with dt — 4th-order accuracy

