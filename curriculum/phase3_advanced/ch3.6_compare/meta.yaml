#   commit: <author pins a real sha>
#   focus:
#     - mj_step / the integration + constraint pipeline: the reference dynamics this chapter's
#       two-mass frictionless-contact engine is a stripped-down, honestly-worse approximation of
#     - the contact/friction model the learner's engine OMITS (Coulomb friction, the friction
