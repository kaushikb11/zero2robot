id: ch3.6-compare
title: "Full Circle: Run Your ch1.1 Policy in the Engine You Built"
track: elective            # off the main line (0→1→2→4→5) — Phase 3 is optional Depth; a self-contained elective, NOT a capstone prerequisite. /map/ renders these nodes as "optional · Depth".
artifact: compare.py         # 407 LOC (<=450 cap), CPU-only; pure-numpy from-scratch engine + torch eval of the ch1.1 BC policy. MuJoCo appears ONLY as the comparison reference (the ground-truth sim), never in the learner's engine.
task: pusht-sim-to-sim       # RE-CREATE PushT in the ch3.3-3.5 engine, run the ch1.1 BC policy in BOTH sims, MEASURE the gap
policy_reused: ch1.1-bc      # the FULL CIRCLE: runs ch1.1's OWN canonical checkpoint (outputs/ch1.1-bc/bc_policy.ts.pt, the 500-demo 0.62-in-MuJoCo policy) reloaded not retrained — this is the /map/ "full circle" edge back to Phase 1
objectives:
  - Close the "Build a Physics Engine" arc: RE-CREATE PushT inside the from-scratch numpy engine you built — the pusher (a velocity-servo disk) and the T-block (TWO point masses on a ch3.4 rigid distance link, its yaw EMERGENT from the line between them), pushed by the ch3.5 body-body contact solver (`solve_contacts`, reused wholesale). Match the pusht obs[10]/action[2] contract so the ch1.1 policy plugs straight in.
  - Run the SAME ch1.1 BC policy — trained in MuJoCo, reloaded not retrained — in BOTH the MuJoCo PushT (ground truth) and your-engine PushT (the test), from bit-identical initial states, and see with your own eyes that the thing you have trusted since ch0.1 is something you can now build, and your policy runs in it.
  - MEASURE the sim-to-sim gap two honest ways: TRANSFER (BC success in MuJoCo vs in your engine) and DIVERGENCE (from one shared start, replay MuJoCo's exact actions in your engine and watch the block poses pull apart — pure dynamics gap, no policy feedback).
  - Connect that sim-to-SIM gap to the sim-to-REAL gap of ch2.6: both are a policy meeting dynamics its training never showed it. The gap is not a bug to be eliminated but a quantity to be measured and respected — and a physics knob (block drag) that closes/widens it makes the point concrete.

scale_lab: false
# ch3.6 is the free-tier close of the from-scratch arc (map: 3.3-3.6 need only Phase 0 +
# the ch1.1 BC policy). The engine is ~200 lines of pure-numpy stepping + tiny scalar contact
# solves; the policy is a reloaded MLP run under torch.no_grad on CPU. Nothing to scale onto a
# GPU. The only knobs are the LESSON: --block_damp / --pusher_mass move the sim-to-sim gap.

# READ-THE-REAL-THING: the map pairs this arc's close with a real sim2sim / engine reference.
# The rtrt: block is LEFT FOR THE AUTHOR to pin — I did not have a verified offline commit sha
# and must never invent one. Good candidates: MuJoCo's own engine internals (mj_step / the
# passive+constraint+integration pipeline — the ground-truth this chapter compares AGAINST), or
# a published sim-to-sim / domain-randomization transfer study (the framing that a policy meeting
# unmodeled dynamics degrades in a MEASURABLE way — the same story as ch2.6 sim-to-real).
read_the_real_thing: true
rtrt:
  repo: google-deepmind/mujoco
  commit: 28009f9105cd92784b7b0b30c0605a5e29107a77   # tag 3.10.0 (matches the course-pinned mujoco); pinned 2026-07-07
  focus:
    - "mj_step / the integration + constraint pipeline: the reference dynamics this chapter's two-mass frictionless-contact engine is a stripped-down, honestly-worse approximation of"
    - "the contact/friction model the learner's engine OMITS (Coulomb friction, the friction cone, the shaped rigid body) — i.e. exactly where the sim-to-sim gap measured here comes from"

demo: pusht_sim2sim          # both sims' block trajectories overlaid + the transfer/divergence comparison; pure numpy engine vs MuJoCo replay

# Reference run: the FULL default comparison (--policy outputs/ch1.1-bc/bc_policy.ts.pt --seed 0
# --episodes 50, pusher_mass 4.0, block_damp 6.0, baumgarte 40.0, horizon 300). This chapter RUNS
# ch1.1's OWN canonical policy — bc.py at 600 epochs / seed 0 / cpu on 500 scripted-expert demos, the
# exact checkpoint ch1.1's reference run reports (31/50 = 0.62 in MuJoCo, mean return -36.6). It does
# NOT train a policy of its own. Because compare.py's MuJoCo side draws the SAME held-out eval seeds
# (10000+) as ch1.1's bc.py eval and CPU MuJoCo is bitwise deterministic, its MuJoCo success
# REPRODUCES ch1.1's 0.62 exactly — the cross-check that the ground-truth side is honest. seed 0, cpu.
reference_run:
  provenance: "seed 0 on cpu; numpy 2.4.6, torch 2.10.0, mujoco 3.10.0; policy = ch1.1's canonical bc.py 600ep/seed0 on 500 scripted demos (outputs/ch1.1-bc/bc_policy.ts.pt, ch1.1 eval 31/50=0.62); compare.py --episodes 50 --pusher_mass 4.0 --block_damp 6.0 --baumgarte 40.0 (horizon 300); measured 2026-07-07"
  # --- TRANSFER: the same policy, two sims (the FULL CIRCLE headline) ---
  mj_success_rate: 0.62              # ground truth: ch1.1's OWN policy in the sim it trained in (== bc.py's 31/50 eval, reproduced exactly)
  engine_success_rate: 0.20          # the SAME policy in the engine YOU built — it PARTLY works
  transfer_retained: 0.32            # your engine keeps ~1/3 of MuJoCo's success — an honest, imperfect transfer, NOT a clean match
  # --- DIVERGENCE: one shared start, MuJoCo's exact actions replayed in your engine (open-loop) ---
  mean_pos_divergence_m: 0.082256    # mean block-position gap over the episode (the block is ~0.12 m wide, so this is real)
  mean_ang_divergence_rad: 0.944621  # mean block-YAW gap — the DOMINANT gap: your simplified contact rotates the T much worse than MuJoCo's shaped block does
  # HONESTY (author MUST keep this framing — it is the measured truth, and the whole point):
  #  * The policy TRANSFERS IMPERFECTLY, and that is correct. A from-scratch engine of two point
  #    masses + frictionless normal contact is a WORSE PushT than MuJoCo's; a policy trained in one
  #    and dropped in the other should lose success and drift. It does (0.62 -> 0.20). Do NOT tune
  #    the knobs to fake a clean 0.62 -> 0.62 — a perfect match here would be a bug or a lie.
  #  * The ANGLE gap dominates the POSITION gap. That is diagnostic, not incidental: pushing a
  #    two-point-mass dumbbell rotates the T with far less authority than pushing MuJoCo's welded
  #    two-box body, so the policy aligns the block much worse in your engine. Say why, plainly.
  #  * The engine success (0.20) is noisy at 50 episodes (a coarse 0/1 metric); the DIVERGENCE is
  #    the smooth, seed-robust number. Lead the honesty with "lower + diverging", not the exact 0.20.
  #  * Tie it to ch2.6: this is sim-to-SIM, but the mechanism is identical to sim-to-REAL — a policy
  #    meeting dynamics (unmodeled friction, the wrong body shape) its training never showed it.
  # --- The GAP KNOB (ex3): --block_damp is a proxy for the block's (missing) surface friction ---
  #   Raising it toward MuJoCo's heavily-damped tee CLOSES the position divergence, monotonically
  #   (block_damp 2/6/20/60: 0.1228/0.0823/0.0766/0.0755 m) and seed-robustly: mean_pos_divergence
  #   block_damp 2 -> 60 : 0.1228 -> 0.0755 (1.6x); mean_ang divergence 1.2044 -> 0.8766. The gap is
  #   a modeling choice you can measure yourself moving.

# Reference bands + provenance for the exercise checks (exercise-spec: seeded band with provenance,
# not a bare magic number). checks.py reads these instead of inlining tolerances.
exercise_checks:
  smoke:                             # compare.py --smoke (fresh UNTRAINED policy, 2 ep, horizon 40) — the hermetic signature CI can always reproduce
    provenance: "seed 0 on cpu, numpy 2.4.6/torch 2.10.0, --smoke (fresh seeded untrained policy, 2 episodes, horizon 40); measured 2026-07-06"
    mj_success_rate: 0.0             # a random policy succeeds in neither sim
    engine_success_rate: 0.0
    mean_pos_divergence_m: 0.003956  # tiny: an untrained policy barely moves the block in 40 steps
    mean_ang_divergence_rad: 0.039209
    reproduce_abs: 1.0e-6            # compare.py's own smoke run reproduces these to well within this band (numpy + torch-CPU eval are deterministic)
  ex1:                               # ex1_predict_transfer.py (predict-then-run: does the BC policy transfer to your engine?)
    answer: "C"                      # PARTLY — success drops (~0.62 -> ~0.20) and trajectories diverge, most of all in ANGLE (the rotational gap)
  ex2:                               # ex2_completion_contract.py (code-completion: the yaw-from-two-masses recovery + the obs[10] assembly that lets the policy plug in)
    reproduce_abs: 1.0e-12           # the completed block_yaw + obs assembly must match the reference to within this
  ex3:                               # ex3_gap_knob.py (hyperparameter-investigation: --block_damp closes the sim-to-sim divergence)
    answer: "B"                      # raising the block drag toward MuJoCo's quasi-static tee SHRINKS the divergence
    divergence_ratio_min: 1.4        # mean_pos_divergence at block_damp 2 is ~1.6x that at block_damp 60; 1.4x is the seed-robust floor
    provenance: "seed 0 on cpu; block_damp sweep {2,6,20,60} -> mean_pos 0.1228/0.0823/0.0766/0.0755 m, --episodes 50, ch1.1's canonical 500-demo policy; measured 2026-07-07"


