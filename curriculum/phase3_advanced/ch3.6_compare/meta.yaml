demo: pusht_sim2sim          # both sims' block trajectories overlaid + the transfer/divergence comparison; pure numpy engine vs MuJoCo replay

# Reference run: the FULL default comparison (--policy <trained ch1.1 ts.pt> --seed 0 --episodes 50,
# pusher_mass 4.0, block_damp 6.0, baumgarte 40.0, horizon 300). The BC policy was trained by ch1.1's
# bc.py (600 epochs, seed 0, cpu) on 300 scripted-expert demos; its MuJoCo eval success is 0.54, and
# this chapter's MuJoCo-side rollout REPRODUCES that 0.54 exactly (same held-out eval seeds 10000+),
# which is the cross-check that the ground-truth side is honest. All numbers seed 0 on cpu.
reference_run:
  provenance: "seed 0 on cpu; numpy 2.4.6, torch 2.10.0, mujoco 3.10.0; policy = ch1.1 bc.py 600ep/seed0 on 300 scripted demos; compare.py --episodes 50 --pusher_mass 4.0 --block_damp 6.0 --baumgarte 40.0 (horizon 300); measured 2026-07-06"
  # --- TRANSFER: the same policy, two sims (the FULL CIRCLE headline) ---
  mj_success_rate: 0.54              # ground truth: the ch1.1 BC policy in the sim it trained in (== bc.py's own eval, reproduced)
  engine_success_rate: 0.18          # the SAME policy in the engine YOU built — it PARTLY works
  transfer_retained: 0.33            # your engine keeps ~1/3 of MuJoCo's success — an honest, imperfect transfer, NOT a clean match
  # --- DIVERGENCE: one shared start, MuJoCo's exact actions replayed in your engine (open-loop) ---
  mean_pos_divergence_m: 0.074077    # mean block-position gap over the episode (the block is ~0.12 m wide, so this is real)
  mean_ang_divergence_rad: 0.886591  # mean block-YAW gap — the DOMINANT gap: your simplified contact rotates the T much worse than MuJoCo's shaped block does
  # HONESTY (author MUST keep this framing — it is the measured truth, and the whole point):
  #  * The policy TRANSFERS IMPERFECTLY, and that is correct. A from-scratch engine of two point
  #    masses + frictionless normal contact is a WORSE PushT than MuJoCo's; a policy trained in one
  #    and dropped in the other should lose success and drift. It does (0.54 -> 0.18). Do NOT tune
  #    the knobs to fake a clean 0.54 -> 0.54 — a perfect match here would be a bug or a lie.
  #  * The ANGLE gap dominates the POSITION gap. That is diagnostic, not incidental: pushing a
  #    two-point-mass dumbbell rotates the T with far less authority than pushing MuJoCo's welded
  #    two-box body, so the policy aligns the block much worse in your engine. Say why, plainly.
  #  * The engine success (0.18) is noisy at 50 episodes (a coarse 0/1 metric); the DIVERGENCE is
  #    the smooth, seed-robust number. Lead the honesty with "lower + diverging", not the exact 0.18.
  #  * Tie it to ch2.6: this is sim-to-SIM, but the mechanism is identical to sim-to-REAL — a policy
  #    meeting dynamics (unmodeled friction, the wrong body shape) its training never showed it.
  # --- The GAP KNOB (ex3): --block_damp is a proxy for the block's (missing) surface friction ---
  #   Raising it toward MuJoCo's heavily-damped tee CLOSES the divergence, monotonically and
  #   seed-robustly: mean_pos_divergence  block_damp 2 -> 60 : 0.1083 -> 0.0576 (1.9x); mean_ang
  #   divergence 0.9246 -> 0.7153. The gap is a modeling choice you can measure yourself moving.

# Reference bands + provenance for the exercise checks (exercise-spec: seeded band with provenance,
# not a bare magic number). checks.py reads these instead of inlining tolerances.
exercise_checks:
  smoke:                             # compare.py --smoke (fresh UNTRAINED policy, 2 ep, horizon 40) — the hermetic signature CI can always reproduce
    provenance: "seed 0 on cpu, numpy 2.4.6/torch 2.10.0, --smoke (fresh seeded untrained policy, 2 episodes, horizon 40); measured 2026-07-06"
    mj_success_rate: 0.0             # a random policy succeeds in neither sim
    engine_success_rate: 0.0
    mean_pos_divergence_m: 0.003956  # tiny: an untrained policy barely moves the block in 40 steps
    mean_ang_divergence_rad: 0.039209
    reproduce_abs: 1.0e-6            # compare.py's own smoke run reproduces these to well within this band (numpy + torch-CPU eval are deterministic)
  ex1:                               # ex1_predict_transfer.py (predict-then-run: does the BC policy transfer to your engine?)
    answer: "C"                      # PARTLY — success drops (~0.54 -> ~0.18) and trajectories diverge, most of all in ANGLE (the rotational gap)
  ex2:                               # ex2_completion_contract.py (code-completion: the yaw-from-two-masses recovery + the obs[10] assembly that lets the policy plug in)
    reproduce_abs: 1.0e-12           # the completed block_yaw + obs assembly must match the reference to within this
  ex3:                               # ex3_gap_knob.py (hyperparameter-investigation: --block_damp closes the sim-to-sim divergence)
    answer: "B"                      # raising the block drag toward MuJoCo's quasi-static tee SHRINKS the divergence
    divergence_ratio_min: 1.4        # mean_pos_divergence at block_damp 2 is ~1.9x that at block_damp 60; 1.4x is the seed-robust floor
    provenance: "seed 0 on cpu; block_damp sweep {2,6,20,60}, --episodes 50, trained ch1.1 policy; measured 2026-07-06"

