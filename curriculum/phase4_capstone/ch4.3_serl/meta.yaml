id: ch4.3-serl
title: "RL Post-Training: HIL-SERL in Sim"
# THE CAPSTONE ALGORITHM (map 4.3). This is the last agent-buildable chapter —
# where BC (1.1), corrections (4.2), the offline prior (the primer), and SAC (2.2)
# converge. Map row: "RL fine-tuning of the learner's VLA with their correction
# data as prior; sample-efficiency the whole point." Phase 4 requires 1.8 + 2.1 +
# 2.2 + 1.6: 2.2 supplies the off-policy/replay/entropy substrate; the primer
# supplies the offline-prior substrate.
artifact: serl.py          # 446 LOC; hard cap 450. This is the convergence chapter (AWAC prior + SAC online
                           # + the from-scratch comparison in one file), so it runs long but stays under the cap.
task: pusher_reach         # curriculum/common/envs/pusher_reach — dense reward (-distance), continuous torque (ch2.2's env)
dataset:
  reference: null          # the "dataset" is the CORRECTIONS: scripted-expert transitions collected in-file (ch4.2's mechanism, the teleop stand-in); no external demos
  learner_path: false      # the browser-teleop corrections path is ch4.2; here the scripted expert is the offline stand-in

phase_requires: [ch1.8, ch2.1, ch2.2, ch1.6]
# and the offline primer (corrections -> AWAC prior). 1.8 = the learner's VLA (the
# base policy this post-trains in the real capstone); 2.2 = SAC (the online
# substrate); 1.6 = the eval harness (Wilson/Newcombe CIs); 2.1 = PPO (the RL
# on-ramp). The offline primer is the direct algorithmic parent (its AWAC IS the
# prior here) — the author wires that map edge when the primer's number lands.

# PUBLIC TASK, GATED LEADERBOARD (honest framing). The map's capstone SUITE is
# HIDDEN-SEED graded (grader/hidden_seeds, off-limits). This chapter runs the SAME
# HIL-SERL algorithm on the PUBLIC pusher_reach env so the mechanism is fully
# readable and reproducible on a laptop; the graded leaderboard number is the
# gated capstone (ch4.4). The chapter never claims to reproduce the graded score.

objectives:
  - "Assemble HIL-SERL from the pieces the learner already built: corrections (ch4.2) -> an AWAC offline prior (the primer, reusing ch2.2's twin-Q) -> online SAC fine-tuning (ch2.2) with the corrections kept in the replay (RLPD-style)"
  - "Explain WHY corrections-as-prior buy sample efficiency: an offline prior extracted from the corrections starts the policy at a good return with ZERO online interaction, so online RL needs far fewer environment samples than starting from scratch"
  - "Measure, don't assert, the sample efficiency: samples-to-threshold for HIL-SERL (primed) vs SAC-from-scratch (cold), with ch1.6 error bars (Wilson CI + a difference CI) — HIL-SERL clears the bar at ~0 online samples, scratch needs thousands"
  - "Run the honest ablation (prior-alone vs from-scratch-online vs HIL-SERL) and read what each piece buys — on this free-tier task the corrections/prior deliver essentially all the efficiency and online fine-tuning HOLDS the prior; report that truthfully rather than overclaiming"
  - "Tie the mechanism to the real thing: the same corrections->prior->online-fine-tune loop is how HIL-SERL/RLPD post-train real robot policies, and where the online phase pays off (harder tasks, the gated capstone suite)"

# MEASURED reference run. PROVENANCE: cpu (forced), torch 2.10.0 / mujoco 3.10.0 /
# numpy 2.4.6; DEFAULT config (corr_episodes 60, prior_steps 8000, hil_steps 6000,
# scratch_steps 12000, threshold 0.10 m, eval n_seeds 3 x eval_episodes 10 = 30
# pooled rollouts); seeds 0,1,2; measured 2026-07-07; ~2.7 min/seed on cpu-laptop.
reference_run:
  headline: "HIL-SERL clears the reach threshold in ~0 online samples (the corrections-as-prior put it there); from-scratch SAC needs ~10,000-11,000 online samples to reach the same bar. Seed-robust."
  samples_to_threshold_hil: [0, 0, 0]            # prior clears <0.10 m at zero online samples on every seed
  samples_to_threshold_scratch: [10000, 11000, 10000]
  prior_eval_dist_per_seed: [0.061, 0.074, 0.069]     # m; random baseline ~0.176
  prior_success_per_seed: [0.367, 0.333, 0.333]       # pooled N=30 each
  scratch_best_dist_per_seed: [0.086, 0.089, 0.068]
  scratch_success_per_seed: [0.100, 0.067, 0.267]
  hil_best_dist_per_seed: [0.065, 0.077, 0.052]       # HIL best checkpoint (= prior on s0/s1; online improved it on s2: 0.069 -> 0.052)
  hil_success_per_seed: [0.367, 0.333, 0.333]
  diff_ci_hil_minus_scratch: "seed0 +0.05..+0.46 (SIG), seed1 +0.06..+0.45 (SIG), seed2 -0.16..+0.28 (ns; scratch got luckier at 0.267). HIL-SERL success >= scratch on all 3 seeds."
  random_baseline_dist: 0.176
  honest_framing: >
    The sample-efficiency win is large, real, and seed-robust — and it comes from
    the CORRECTIONS-AS-PRIOR, not from online fine-tuning. The offline prior (AWAC
    on the corrections, ZERO env interaction) already clears the threshold, so
    HIL-SERL's samples-to-threshold is 0 while from-scratch SAC needs ~10k. On this
    small dense-reward task the prior sits near SAC's own short-horizon ceiling
    (ch2.2's SAC needs ~18k steps just to solve pusher_reach), so online fine-tuning
    HOLDS the prior rather than beating it (best-checkpoint = prior on 2/3 seeds;
    on seed 2 online nudged 0.069 -> 0.052). We report that honestly: the mechanism
    (corrections -> prior -> online) is the lesson; the online-RL-pays-off story is
    on harder tasks and the GATED capstone suite. Do NOT re-frame this as "online
    RL solves what the prior can't" — the measured win is on the SAMPLE AXIS.

# Reference metrics + seeded bands for the exercise checks (exercise-spec: seeded-
# run band with provenance, not a bare magic number). checks.py reads these. Bands
# assert the STRONG, seed-robust signal (ch2.1 spike H1/H2), never a flaky effect.
exercise_checks:
  ex1:                     # ex1_predict_sample_efficiency.py — HIL vs scratch samples-to-threshold, seeds 0-2, DEFAULT config
    provenance: "cpu, seeds 0-2, default config; measured 2026-07-07: HIL samples-to-threshold [0,0,0], scratch [10000,11000,10000]"
    hil_sts_max: 2000        # HIL clears the threshold within this many online samples (measured 0 on every seed); assert <= this AND strictly fewer than scratch
  ex2:                     # ex2_investigate_corrections.py — starved(15) vs default(60) correction episodes, seeds 0-1
    provenance: "cpu, seeds 0-1; measured 2026-07-07: default(60) prior_dist [0.061,0.074] (clears the 0.10 m threshold, HIL sts [0,0]); starved(15) prior_dist [0.117,0.111] (FAILS the threshold, HIL sts [6000,None]). The starvation effect is clean here but left OBSERVATIONAL — the learner reads the direction/size; only the default arm is gated."
    default_prior_dist_max: 0.095   # the default corrections build a prior that clears the threshold on every seed (measured max 0.074 m); the starvation trend is left observational (ch2.1-spike honesty)

# read_the_real_thing: TRUE. Anchors: the HIL-SERL paper (Luo et al., "Precise and
# Dexterous Robotic Manipulation via Human-in-the-Loop RL") and RLPD (Ball et al.,
# "Efficient Online RL with Offline Data" — corrections-in-replay / symmetric
# sampling / LayerNorm critics). The point of the reading: what the grown-up
# version does that this file does not — a real human teleoperator in the loop
# online (not a scripted stand-in), a learned reward classifier instead of a dense
# analytic reward, and the RLPD stabilizers that let online fine-tuning genuinely
# IMPROVE the prior on hard tasks (here the prior is near-ceiling, so online holds).
# The pinned upstream commits are wired by the read-the-real-thing build step.
read_the_real_thing: true

scale_lab: false           # free-tier CPU config measured (~2.7 min/seed). A GPU Scale Lab (bigger correction sets, a harder contact-rich task, RLPD stabilizers so online fine-tuning has headroom to improve the prior, and the graded suite) is a future add, not this draft.
demo: serl_sample_efficiency   # hero: the sample-efficiency CURVE (eval dist vs online samples), HIL-SERL vs scratch. See demo/embed.yaml.

