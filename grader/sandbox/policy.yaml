# Grader sandbox policy — enforced at runtime, reviewed before every seed rotation
isolation: gvisor            # container-only is insufficient for hostile ONNX; required before Drop 4
network: none
filesystem: read-only except /tmp (100MB)
cpu_limit: 2 cores
memory_limit: 4GiB
wallclock_limit_s: 600
onnx:
  max_file_mb: 200
  opset_allowlist: true      # SEAM: NOT enforced until contract.py's FROZEN_OPSET_ALLOWLIST is populated (from export_onnx.py's emitted opset) at Drop 4 freeze
  load_via: onnxruntime only # never torch.load / pickle paths
